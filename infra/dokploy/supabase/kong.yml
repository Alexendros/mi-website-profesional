# Kong declarative config para Supabase self-hosted.
# Endpoints PostgREST + GoTrue + Realtime + Storage detrás de un único host.
# CORS restrictivo a dominios productivos + localhost dev.
# Rate limit reforzado en endpoints sensibles de auth.

_format_version: "2.1"
_transform: true

consumers:
  - username: anon
    keyauth_credentials:
      - key: ${SUPABASE_ANON_KEY}
  - username: service_role
    keyauth_credentials:
      - key: ${SUPABASE_SERVICE_KEY}

services:
  - name: auth-v1
    url: http://auth:9999
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - https://alexendros.pro
            - https://www.alexendros.pro
            - https://stagekit.app
            - http://localhost:3000
          methods: [GET, POST, PUT, DELETE, OPTIONS]
          headers: [Accept, Authorization, Content-Type, X-Client-Info, apikey]
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 60
          policy: local
          fault_tolerant: true

  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - https://alexendros.pro
            - https://www.alexendros.pro
            - https://stagekit.app
            - http://localhost:3000
          methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
          headers: [Accept, Authorization, Content-Type, X-Client-Info, apikey, Prefer, Range]
          credentials: true
      - name: key-auth
        config:
          hide_credentials: true

  - name: realtime-v1
    url: http://realtime:4000/socket
    routes:
      - name: realtime-v1-all
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
        config:
          origins:
            - https://alexendros.pro
            - https://stagekit.app
          credentials: true

  - name: storage-v1
    url: http://storage:5000
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
        config:
          origins:
            - https://alexendros.pro
            - https://stagekit.app
            - http://localhost:3000
          methods: [GET, POST, PUT, DELETE, OPTIONS]
          headers: [Accept, Authorization, Content-Type, X-Client-Info, apikey]
          credentials: true
