# ═══════════════════════════════════════════════════════════════════════════════
# post-merge · alexendrospro · piloto
#
# Apunta a @main hasta tag v1.0.0 (1 semana de validación en plantillas).
# detect-stack identificará: TS + Docker + Markdown + monorepo (Turborepo).
# ═══════════════════════════════════════════════════════════════════════════════

name: post-merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  attestations: write
  checks: write
  packages: write
  security-events: write

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    uses: Alexendros/plantillas/.github/workflows/_lib-post-merge.yml@main
    with:
      enable_linters: true
      enable_sbom: true
      enable_attest: true
      enable_release: false      # Vercel gestiona deploys; no automatizamos releases aún
    secrets: inherit
