version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: daily
    time: 04:00
    timezone: Europe/Madrid
  open-pull-requests-limit: 1
  labels:
  - dependencies
  - npm
  groups:
    all-npm:
      applies-to: version-updates
      patterns:
      - '*'
      update-types:
      - minor
      - patch
    all-others:
      patterns:
      - '*'
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
  commit-message:
    prefix: build(deps)
    include: scope
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: daily
    time: 04:00
    timezone: Europe/Madrid
  open-pull-requests-limit: 1
  labels:
  - dependencies
  - github-actions
  groups:
    all-actions:
      applies-to: version-updates
      patterns:
      - '*'
      update-types:
      - minor
      - patch
    all-others:
      patterns:
      - '*'
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
  commit-message:
    prefix: build(ci)
    include: scope
